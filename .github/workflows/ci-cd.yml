name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          echo "No tests yet"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_KEY }}
          port: 22
          script: |
            set -e

            # ────────────────────────────────────────────────
            # Navigate to project directory
            # ────────────────────────────────────────────────
            cd /home/aimanbatool114/Project_pipeline || { echo "Project directory not found!"; exit 1; }

            # ────────────────────────────────────────────────
            # Force sync with GitHub — discard local code changes
            # but KEEP: venv, database, logs, pid, credentials
            # ────────────────────────────────────────────────
            git fetch origin main || { echo "Git fetch failed"; exit 1; }
            git reset --hard origin/main || { echo "Git reset failed"; exit 1; }
            git clean -fd \
              --exclude=venv \
              --exclude=gcp-service-account.json \
              --exclude=uvicorn.pid \
              --exclude=uvicorn.log \
              --exclude=products.db \
              --exclude=filled_templates \
              --exclude=.env
            echo "✅ Code synced with GitHub"

            # ────────────────────────────────────────────────
            # Create venv if it doesn't exist
            # ────────────────────────────────────────────────
            if [ ! -f "venv/bin/activate" ]; then
              echo "Creating virtual environment..."
              python3 -m venv venv || { echo "Failed to create venv"; exit 1; }
              echo "✅ Virtual environment created"
            fi

            # ────────────────────────────────────────────────
            # Activate virtual environment
            # ────────────────────────────────────────────────
            source venv/bin/activate || { echo "Failed to activate virtualenv"; exit 1; }

            # ────────────────────────────────────────────────
            # Update dependencies
            # ────────────────────────────────────────────────
            pip install --upgrade pip
            pip install -r requirements.txt || { echo "Failed to install dependencies"; exit 1; }

            # ────────────────────────────────────────────────
            # Set secrets as environment variables
            # ────────────────────────────────────────────────
            export OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}"
            echo "${{ secrets.GCP_SA_KEY }}" > gcp-service-account.json
            export GOOGLE_APPLICATION_CREDENTIALS="$(pwd)/gcp-service-account.json"

            # ────────────────────────────────────────────────
            # Stop old uvicorn using PID file
            # ────────────────────────────────────────────────
            PID_FILE="/home/aimanbatool114/Project_pipeline/uvicorn.pid"

            if [ -f "$PID_FILE" ]; then
              OLD_PID=$(cat "$PID_FILE")
              if kill -0 "$OLD_PID" 2>/dev/null; then
                echo "Stopping old uvicorn (PID $OLD_PID)..."
                kill "$OLD_PID" || echo "Could not kill old PID (already gone?)"
                sleep 4
              else
                echo "Old PID $OLD_PID not running anymore"
              fi
              rm -f "$PID_FILE"
            else
              echo "No PID file found — first deploy or already stopped"
            fi

            # ────────────────────────────────────────────────
            # Start FastAPI server
            # ────────────────────────────────────────────────
            nohup /home/aimanbatool114/Project_pipeline/venv/bin/python -m uvicorn main:app \
              --host 0.0.0.0 \
              --port 8686 \
              --log-level info \
              --access-log \
              > uvicorn.log 2>&1 &

            NEW_PID=$!
            echo "$NEW_PID" > "$PID_FILE"
            disown

            echo "✅ Deployment complete. PID $NEW_PID"
            echo "Logs: tail -f /home/aimanbatool114/Project_pipeline/uvicorn.log"
