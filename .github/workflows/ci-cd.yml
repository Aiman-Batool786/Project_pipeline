name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          echo "No tests yet"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set OpenAI API key
        run: |
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> $GITHUB_ENV

      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_KEY }}
          port: 22
          script: |
            # Navigate to project directory
            cd /home/aimanbatool114/Project_pipeline

            # Pull latest code
            git pull origin main

            # Activate virtual environment
            source env/bin/activate

            # Install/update dependencies
            pip install --upgrade pip
            pip install -r requirements.txt

            # Set OpenAI API key and write GCP key to file
            export OPENAI_API_KEY=${OPENAI_API_KEY}
            echo "$GCP_SA_KEY" > gcp-service-account.json
            export GOOGLE_APPLICATION_CREDENTIALS="$(pwd)/gcp-service-account.json"

            # Stop only if process owned by current user
            pkill -f "uvicorn main:app" || echo "No old process"

            # Start FastAPI safely inside virtual environment
            /home/aimanbatool114/Project_pipeline/env/bin/python -m uvicorn main:app --host 0.0.0.0 --port 8686 > uvicorn.log 2>&1 &
            disown
